server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve hashed build assets with long-lived caching — Vite fingerprints
    # filenames, so `immutable` is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path returns index.html so React Router
    # can resolve client-side routes like /prophecy/42.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must not be cached aggressively — it's the entry point
    # that references the fingerprinted assets.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Basic hardening headers. CSP is intentionally omitted here because
    # the app loads inline styles from Chakra — tightening that is a
    # separate task.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
